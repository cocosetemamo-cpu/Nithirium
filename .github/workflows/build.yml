name: Nithirium Build

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      # ── NithiriumAgent ──────────────────────────────────────────
      - name: Build NithiriumAgent (Gradle)
        working-directory: NithiriumAgent
        run: gradle shadowJar

      # ── NithiriumCore ───────────────────────────────────────────
      - name: Initialize BGFX submodule
        working-directory: NithiriumCore
        run: git submodule update --init --recursive

      - name: Configure NithiriumCore (CMake)
        working-directory: NithiriumCore
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build NithiriumCore (CMake)
        working-directory: NithiriumCore
        run: cmake --build build --config Release --target install

      # ── Upload artifacts ────────────────────────────────────────
      - name: Upload Nithirium artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nithirium-build
          path: |
            NithiriumAgent/build/libs/NithiriumAgent.jar
            NithiriumCore/build/dist/bin/NithiriumCore.dll
